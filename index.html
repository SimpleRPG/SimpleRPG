<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>しんぷるRPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- appRoot 以下のレイアウトは html1.js / html2.js で動的に組み立てる -->
  <div id="appRoot"></div>

  <!-- ===== データ系 ===== -->
  <!-- アイテム共通メタ管理（cook-data.js や今後の equip/gather-equip から参照） -->
  <script src="item-meta-core.js"></script>
  <!-- ★追加: 素材（一次素材・中間素材）と ITEM_META 連携コア -->
  <script src="materials-core.js"></script>

  <script src="enemy-data.js"></script>
  <script src="gather-data.js"></script>
  <script src="combat-equip-data.js"></script>
  <!-- 採取用武器・採取用防具マスタ（戦闘装備から分離した新ファイル） -->
  <script src="gather-equip-data.js"></script>
  <script src="craft-item-data.js"></script>
  <!-- ★追加: 家具データ（ベッドT1〜T10など） -->
  <script src="housing-furniture-data.js"></script>
  <script src="game-shop.js"></script>
  <script src="cook-data.js"></script>
  <script src="inventory-core.js"></script>
  <script src="farm-core.js"></script>
  <!-- 畑・菜園用 肥料システム -->
  <script src="fertilizer-core.js"></script>
  <script src="fish-data.js"></script>
  <script src="status-effects-core.js"></script>
  <!-- ペット種・特性ロジック -->
  <script src="pet.js"></script>

  <!-- ===== game-core 系（1〜8 全部） ===== -->
  <script src="game-core-1.js"></script>
  <script src="game-core-2.js"></script>
  <script src="game-core-3.js"></script>
  <script src="game-core-4.js"></script>
  <script src="game-core-5.js"></script>
  <script src="game-core-7.js"></script>
  <script src="game-core-8.js"></script>

  <!-- ★追加: クラフト共通ロジック（素材チェック・統計・スキルEXP） -->
  <script src="craft-core.js"></script>
  <!-- ★追加: クラフト実行ロジック（武器・防具・ポーション・道具・料理・家具） -->
  <script src="craft-actions.js"></script>

  <!-- スキル・スキルツリー -->
  <script src="skill-core.js"></script>
  <script src="skilltree.js"></script>

  <!-- マーケット・セーブ系 -->
  <script src="market-core1.js"></script>
  <script src="market-core2.js"></script>
  <script src="save-system.js"></script>

  <!-- ギルド系 -->
  <script src="guild-quests.js"></script>
  <script src="guild.js"></script>
  <script src="guild2.js"></script>
  <script src="guildskill.js"></script>

  <!-- 装備修理 -->
  <script src="repair-core.js"></script>

  <!-- ハウジングコア -->
  <script src="housing-core.js"></script>

  <!-- 日替わりボーナス -->
  <script src="daily-bonus.js"></script>
  
  <!-- レイアウト＋UI初期化（新構成） -->
  <!-- 1: レイアウト（タブやページ本体など HTML を組み立てる：前半） -->
  <script src="html1.js"></script>
  <!-- 1.2: レイアウト後半（ステータス・ギルド・拠点・モーダルなど） -->
  <script src="html2.js"></script>
  
  <!-- ===== UI ロジック群（DOM操作系） ===== -->
  <script src="game-ui.js"></script>
  <script src="game-ui-2.js"></script>
  <script src="game-ui-3.js"></script>
  <script src="game-ui-4.js"></script>
  <!-- ★追加: ハウジング家具グリッドUI -->
  <script src="housing-ui-grid.js"></script>
  <script src="gather-stats-ui.js"></script>
  <script src="asobikata.js"></script>
  <!-- ★追加: 倉庫UI共通ロジック（倉庫タブ + 拠点倉庫サブタブ） -->
  <script src="game-ui-5.js"></script>

  <!-- Socket.io クライアント（io() を使う前に読み込む） -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- ===== テストプレイヤー（テトちゃん） ===== -->
  <!-- ベースの自動テストプレイヤー本体 -->
  <script src="teto-ai.js"></script>
  <!-- 性格・賢さレイヤーなどの拡張ロジック（teto-ai.js の後に読む） -->
  <script src="teto-ai2.js"></script>
  <script src="teto-ai3.js"></script>
  <script src="teto-ai4.js"></script>

  <!-- 統計・内部状態をまとめるコア -->
  <script src="debug-stats-core.js"></script>
  <!-- ★追加: テトちゃん評価・寄与評価ロジック -->
  <script src="debug-stats-core2.js"></script>
  <!-- GMタブの UI（tetoPersonality / tetoAiLevel などもここから触る想定） -->
  <script src="debug-ui.js"></script>

  <!-- 2: タブ切り替え・市場・ギルド・Socket 初期化など UI イベント -->
  <!-- ※旧 html2.js を htmllast.js に改名した前提 -->
  <script src="htmllast.js"></script>
  
</body>
</html>
